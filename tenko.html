<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点呼記録 — ドラメモ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans',sans-serif;background:#f7f4f0;min-height:100vh;color:#0f1c35}
.header{background:#f59e0b;padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:1rem;font-weight:700;color:#fff}
.back-btn{background:rgba(255,255,255,.2);border:none;border-radius:6px;padding:5px 12px;font-size:.78rem;color:#fff;cursor:pointer}
.main{max-width:480px;margin:0 auto;padding:1rem}

.status-bar{background:#fff;border-radius:12px;border:1px solid #fde68a;padding:1rem 1.25rem;margin-bottom:1rem}
.status-title{font-size:.75rem;font-weight:700;color:#92400e;margin-bottom:.75rem}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.status-item{text-align:center;padding:.75rem;border-radius:8px;background:#f7f4f0}
.status-item.done{background:#dcfce7}
.status-item.pending{background:#fef3c7}
.status-label{font-size:.72rem;color:#7a8a9e;margin-bottom:4px}
.status-value{font-size:.85rem;font-weight:700}
.status-item.done .status-value{color:#166534}
.status-item.pending .status-value{color:#92400e}

.card{background:#fff;border-radius:12px;border:1px solid #fde68a;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:.78rem;font-weight:700;color:#92400e;margin-bottom:1rem;text-transform:uppercase;letter-spacing:.5px}

.type-btns{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.type-btn{padding:14px;border-radius:10px;border:2px solid #fde68a;background:#fef9ee;cursor:pointer;text-align:center;transition:all .15s}
.type-btn.active{border-color:#f59e0b;background:#fef3c7}
.type-btn-icon{font-size:1.4rem;margin-bottom:4px}
.type-btn-label{font-size:.85rem;font-weight:700;color:#0f1c35}
.type-btn-sub{font-size:.72rem;color:#7a8a9e}

label{font-size:.85rem;color:#5a6a82;display:block;margin-bottom:5px}
input[type=number],input[type=text],textarea{width:100%;border:1.5px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:.9rem;color:#0f1c35;outline:none;background:#fff;margin-bottom:1rem}
input[type=number]:focus,input[type=text]:focus,textarea:focus{border-color:#f59e0b}
textarea{resize:vertical;min-height:70px}

.alcohol-row{display:flex;gap:.75rem;align-items:flex-end;margin-bottom:1rem}
.alcohol-row>div:first-child{flex:1}
.alcohol-row>div:last-child{margin-bottom:1rem}
.alcohol-row input{margin-bottom:0}
.alc-badge{display:inline-block;padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:700}
.alc-badge.ok{background:#dcfce7;color:#166534}
.alc-badge.ng{background:#fee2e2;color:#991b1b}

.radio-group{display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
.radio-btn{padding:8px 14px;border-radius:8px;border:1.5px solid #fde68a;background:#fef9ee;cursor:pointer;font-size:.82rem;font-weight:600;color:#5a6a82;transition:all .15s}
.radio-btn.active{border-color:#f59e0b;background:#fef3c7;color:#92400e}
.radio-btn.ng-active{border-color:#e24b4a;background:#fee2e2;color:#991b1b}

.submit-btn{width:100%;background:#f59e0b;color:#fff;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:background .2s}
.submit-btn:hover{background:#d97706}
.submit-btn:disabled{opacity:.6}

.msg{font-size:.85rem;text-align:center;margin-top:1rem;padding:.75rem;border-radius:8px}
.msg.ok{background:#dcfce7;color:#166534}
.msg.err{background:#fee2e2;color:#991b1b}

.today-section{background:#fff;border-radius:12px;border:1px solid #fde68a;overflow:hidden;margin-bottom:1rem}
.today-header{padding:.75rem 1.25rem;border-bottom:1px solid #fef3c7;font-size:.85rem;font-weight:700;color:#92400e}
.today-item{padding:1rem 1.25rem;border-bottom:1px solid #fef9ee}
.today-item:last-child{border-bottom:none}
.today-type{font-size:.82rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:.5rem}
.today-detail{font-size:.78rem;color:#7a8a9e;line-height:1.8}
.badge{display:inline-block;font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:20px}
.badge.before{background:#fef3c7;color:#92400e}
.badge.after{background:#fde68a;color:#78350f}
.badge.done{background:#dcfce7;color:#166534}
.empty{padding:1.5rem;text-align:center;color:#7a8a9e;font-size:.82rem}
.loading{padding:2rem;text-align:center;color:#7a8a9e;font-size:.85rem}
</style>
</head>
<body>
<div class="header">
  <span class="header-title">📋 点呼記録</span>
  <button class="back-btn" onclick="window.location.href='home.html'">← ホーム</button>
</div>

<div class="main">
  <div class="status-bar">
    <div class="status-title">今日の点呼状況</div>
    <div class="status-grid">
      <div class="status-item" id="status-before">
        <div class="status-label">乗務前点呼</div>
        <div class="status-value" id="before-status">未完了</div>
      </div>
      <div class="status-item" id="status-after">
        <div class="status-label">乗務後点呼</div>
        <div class="status-value" id="after-status">未完了</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">点呼を記録する</div>
    <div class="type-btns">
      <div class="type-btn active" id="btn-before" onclick="setType('before')">
        <div class="type-btn-icon">🌅</div>
        <div class="type-btn-label">乗務前</div>
        <div class="type-btn-sub">出発前</div>
      </div>
      <div class="type-btn" id="btn-after" onclick="setType('after')">
        <div class="type-btn-icon">🌙</div>
        <div class="type-btn-label">乗務後</div>
        <div class="type-btn-sub">帰着後</div>
      </div>
    </div>

    <div class="alcohol-row">
      <div>
        <label>アルコール検知値（mg/L）</label>
        <input type="text" inputmode="text" id="alcohol-val" placeholder="0.00" step="0.01" min="0" oninput="checkAlcohol()">
      </div>
      <div><span class="alc-badge ok" id="alc-badge">正常</span></div>
    </div>

    <label>メーター値（km）</label>
    <input type="text" inputmode="text" id="meter-val" placeholder="例：12345">

    <label>健康状態</label>
    <div class="radio-group">
      <div class="radio-btn active" id="h-good" onclick="setHealth('良好')">良好</div>
      <div class="radio-btn" id="h-normal" onclick="setHealth('普通')">普通</div>
      <div class="radio-btn" id="h-bad" onclick="setHealth('不良')">不良</div>
    </div>

    <label>疲労・睡眠</label>
    <div class="radio-group">
      <div class="radio-btn active" id="f-good" onclick="setFatigue('問題なし')">問題なし</div>
      <div class="radio-btn" id="f-tired" onclick="setFatigue('やや疲労')">やや疲労</div>
      <div class="radio-btn" id="f-bad" onclick="setFatigue('疲労あり')">疲労あり</div>
    </div>

    <label>特記事項</label>
    <textarea id="notes" placeholder="特記事項があれば入力してください"></textarea>

    <button class="submit-btn" id="submit-btn" onclick="submitTenko()">点呼を送信する</button>
    <div class="msg" id="msg" style="display:none"></div>
  </div>

  <div class="today-section">
    <div class="today-header">今日の点呼記録</div>
    <div id="today-list"><div class="loading">読込中...</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL='https://atezlxzzsfmabmkigqpg.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0ZXpseHp6c2ZtYWJta2lncXBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTgzMTgsImV4cCI6MjA5NTY3NDMxOH0.uN-517Q9wXyu7_MPzcOn6TfLBsEwnMThy65BUlfBEr4';
var sb=window.supabase.createClient(SURL,SKEY);
var userId=null;
var tenkoType='before';
var healthStatus='良好';
var fatigueStatus='問題なし';
var todayRecords={before:null,after:null};

function getTodayJST(){
  var jst=new Date(new Date().getTime()+9*60*60*1000);
  return jst.toISOString().split('T')[0];
}

async function init(){
  var {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  userId=session.user.id;
  loadToday();
}

async function loadToday(){
  var today=getTodayJST();
  var {data:records}=await sb.from('tenko_records').select('*').eq('user_id',userId).eq('date',today).order('created_at',{ascending:false});
  todayRecords.before=records&&records.find(r=>r.tenko_type==='乗務前')||null;
  todayRecords.after=records&&records.find(r=>r.tenko_type==='乗務後')||null;

  var beforeDone=!!todayRecords.before;
  var afterDone=!!todayRecords.after;
  document.getElementById('before-status').textContent=beforeDone?'完了':'未完了';
  document.getElementById('after-status').textContent=afterDone?'完了':'未完了';
  document.getElementById('status-before').className='status-item'+(beforeDone?' done':' pending');
  document.getElementById('status-after').className='status-item'+(afterDone?' done':' pending');

  var el=document.getElementById('today-list');
  var items=[todayRecords.before,todayRecords.after].filter(Boolean);
  if(items.length===0){el.innerHTML='<div class="empty">まだ記録がありません</div>';return;}
  el.innerHTML=items.map(r=>{
    var typeBadge=r.tenko_type==='乗務前'?'<span class="badge before">乗務前</span>':'<span class="badge after">乗務後</span>';
    var timeVal=r.updated_at||r.created_at;
    var time=timeVal?new Date(timeVal).toLocaleString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="today-item">
      <div class="today-type">${typeBadge} <span class="badge done">送信済</span></div>
      <div class="today-detail">
        アルコール: ${r.alcohol_value||0} mg/L　健康: ${r.health_status||'-'}　疲労: ${r.fatigue_status||'-'}<br>
        メーター: ${r.meter_value||'-'} km　送信: ${time}
        ${r.notes?'<br>特記: '+r.notes:''}
      </div>
    </div>`;
  }).join('');
}

function setType(t){
  tenkoType=t;
  document.getElementById('btn-before').classList.toggle('active',t==='before');
  document.getElementById('btn-after').classList.toggle('active',t==='after');
}

function checkAlcohol(){
  var v=parseFloat(document.getElementById('alcohol-val').value)||0;
  var badge=document.getElementById('alc-badge');
  if(v>=0.15){badge.className='alc-badge ng';badge.textContent='要確認';}
  else{badge.className='alc-badge ok';badge.textContent='正常';}
}

function setHealth(v){
  healthStatus=v;
  ['h-good','h-normal','h-bad'].forEach(id=>document.getElementById(id).className='radio-btn');
  var map={'良好':'h-good','普通':'h-normal','不良':'h-bad'};
  document.getElementById(map[v]).className=v==='不良'?'radio-btn ng-active':'radio-btn active';
}

function setFatigue(v){
  fatigueStatus=v;
  ['f-good','f-tired','f-bad'].forEach(id=>document.getElementById(id).className='radio-btn');
  var map={'問題なし':'f-good','やや疲労':'f-tired','疲労あり':'f-bad'};
  document.getElementById(map[v]).className=v==='疲労あり'?'radio-btn ng-active':'radio-btn active';
}

async function submitTenko(){
  var btn=document.getElementById('submit-btn');
  var msg=document.getElementById('msg');
  btn.disabled=true;

  var today=getTodayJST();
  var ttype=tenkoType==='before'?'乗務前':'乗務後';
  var existing=tenkoType==='before'?todayRecords.before:todayRecords.after;

  // バリデーション
  var alcVal=document.getElementById('alcohol-val').value.trim();
  var meterVal=document.getElementById('meter-val').value.trim();
  if(alcVal&&!/^[0-9.]+$/.test(alcVal)){
    showMsg('アルコール検知値は半角数字で入力してください','err');
    document.getElementById('alcohol-val').value='';btn.disabled=false;return;
  }
  if(meterVal&&!/^[0-9.]+$/.test(meterVal)){
    showMsg('メーター値は半角数字で入力してください','err');
    document.getElementById('meter-val').value='';btn.disabled=false;return;
  }

  var record={
    tenko_type:ttype,
    method:'セルフ',
    alcohol_value:parseFloat(alcVal)||0,
    meter_value:parseInt(meterVal)||null,
    health_status:healthStatus,
    fatigue_status:fatigueStatus,
    notes:document.getElementById('notes').value,
  };

  var error;
  if(existing){
    var res=await sb.from('tenko_records').update(record).eq('id',existing.id);
    error=res.error;
  } else {
    record.user_id=userId;
    record.date=today;
    var res2=await sb.from('tenko_records').insert(record);
    error=res2.error;
  }

  if(error){
    msg.textContent='エラー: '+error.message;
    msg.className='msg err';msg.style.display='block';
    btn.disabled=false;return;
  }

  msg.textContent=existing?'送信し直しました！':'点呼を送信しました！';
  msg.className='msg ok';msg.style.display='block';
  document.getElementById('alcohol-val').value='';
  document.getElementById('meter-val').value='';
  document.getElementById('notes').value='';
  checkAlcohol();setHealth('良好');setFatigue('問題なし');
  btn.disabled=false;
  loadToday();
  setTimeout(()=>{msg.style.display='none';},3000);
}

init();
</script>

<div style="text-align:center;padding:1.5rem 0 2rem;font-size:.7rem;color:#b0bac8;">ドラメモ v1.1.4</div>
</body>
</html>
