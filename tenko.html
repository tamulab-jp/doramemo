<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ドラメモ">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点呼記録 — ドラメモ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans',sans-serif;background:#f7f4f0;min-height:100vh;color:#0f1c35}
.header{background:#f59e0b;padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:1rem;font-weight:700;color:#fff}
.back-btn{background:rgba(255,255,255,.2);border:none;border-radius:6px;padding:5px 12px;font-size:.78rem;color:#fff;cursor:pointer}
.main{max-width:480px;margin:0 auto;padding:1rem}

/* 今日の状況バッジ */
.today-status{display:flex;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.badge-d{font-size:.78rem;padding:6px 14px;border-radius:20px;font-weight:700;border:1.5px solid}
.badge-d.done{border-color:#166534;color:#166534;background:#dcfce7}
.badge-d.pending{border-color:#ddd;color:#aaa;background:#f7f7f7}

/* 種別選択 大ボタン */
.type-wrap{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem}
.type-card{padding:1.5rem .5rem;border-radius:14px;border:2px solid #fde68a;background:#fff;text-align:center;cursor:pointer;transition:all .15s}
.type-card.active{border-color:#f59e0b;background:#fff8e7;box-shadow:0 2px 8px rgba(245,158,11,.2)}
.type-icon{font-size:2.2rem;margin-bottom:.25rem}
.type-label{font-size:.95rem;font-weight:700;color:#0f1c35}
.type-sub{font-size:.72rem;color:#7a8a9e;margin-top:2px}

/* メーター入力 */
.meter-card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.meter-label{font-size:.82rem;color:#7a8a9e;margin-bottom:.5rem}
.meter-input{width:100%;border:2px solid #f59e0b;border-radius:10px;padding:14px;font-size:1.2rem;text-align:center;outline:none;color:#0f1c35}

/* 送信ボタン */
.send-btn{width:100%;background:#f59e0b;color:#fff;border:none;border-radius:12px;padding:16px;font-size:1.1rem;font-weight:900;cursor:pointer;letter-spacing:1px;margin-bottom:1rem;transition:background .2s}
.send-btn:hover{background:#d97706}
.send-btn:disabled{opacity:.6}

.msg{font-size:.85rem;text-align:center;margin-bottom:1rem;padding:.75rem;border-radius:8px}
.msg.ok{background:#dcfce7;color:#166534}
.msg.err{background:#fee2e2;color:#991b1b}

/* 詳細折りたたみ */
.more-toggle{text-align:center;font-size:.78rem;color:#f59e0b;margin-bottom:.75rem;cursor:pointer;font-weight:600}
.more-detail{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;display:none}
.more-detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.detail-item{background:#f7f4f0;border-radius:8px;padding:.75rem;text-align:center}
.detail-item-label{font-size:.7rem;color:#7a8a9e;margin-bottom:4px}

.radio-group{display:flex;gap:.5rem;flex-wrap:wrap}
.radio-btn{padding:6px 12px;border-radius:8px;border:1.5px solid #fde68a;background:#fef9ee;cursor:pointer;font-size:.78rem;font-weight:600;color:#5a6a82;transition:all .15s}
.radio-btn.active{border-color:#f59e0b;background:#fef3c7;color:#92400e}
.radio-btn.ng-active{border-color:#e24b4a;background:#fee2e2;color:#991b1b}

label{font-size:.82rem;color:#5a6a82;display:block;margin-bottom:5px;margin-top:.75rem}
input[type=text]{width:100%;border:1.5px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:.9rem;color:#0f1c35;outline:none;background:#fff;margin-bottom:.5rem}
input[type=text]:focus{border-color:#f59e0b}
textarea{width:100%;border:1.5px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:.9rem;color:#0f1c35;outline:none;background:#fff;resize:vertical;min-height:60px}

/* 今日の記録 */
.today-section{background:#fff;border-radius:12px;border:1px solid #fde68a;overflow:hidden;margin-bottom:1rem}
.today-header{padding:.75rem 1.25rem;border-bottom:1px solid #fef3c7;font-size:.85rem;font-weight:700;color:#92400e}
.today-item{padding:1rem 1.25rem;border-bottom:1px solid #fef9ee}
.today-item:last-child{border-bottom:none}
.today-type{font-size:.82rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:.5rem}
.today-detail{font-size:.78rem;color:#7a8a9e;line-height:1.8}
.badge{display:inline-block;font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:20px}
.badge.before{background:#fef3c7;color:#92400e}
.badge.after{background:#fde68a;color:#78350f}
.badge.done{background:#dcfce7;color:#166534}
.empty{padding:1.5rem;text-align:center;color:#7a8a9e;font-size:.82rem}
.loading{padding:2rem;text-align:center;color:#7a8a9e;font-size:.85rem}

/* 月別 */
.month-nav{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:1rem;background:#fff;border-radius:12px;border:1px solid #fde68a;padding:.875rem}
.month-btn{background:#fef3c7;border:none;border-radius:6px;padding:5px 12px;font-size:.85rem;cursor:pointer;color:#92400e;font-weight:700}
.month-label{font-size:.9rem;font-weight:700}
.records-section{background:#fff;border-radius:12px;border:1px solid #fde68a;overflow:hidden;margin-bottom:1rem}
.records-header{padding:.875rem 1.25rem;border-bottom:1px solid #fef3c7;font-size:.85rem;font-weight:700;color:#92400e;display:flex;justify-content:space-between;align-items:center}
.record-item{padding:.875rem 1.25rem;border-bottom:1px solid #fef9ee}
.record-item:last-child{border-bottom:none}
.record-date{font-size:.82rem;font-weight:700;color:#0f1c35;margin-bottom:4px}
.record-detail{font-size:.75rem;color:#7a8a9e;line-height:1.8}
.csv-btn{background:#fff;border:1.5px solid #f59e0b;color:#92400e;border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:700;cursor:pointer}

.alc-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:700}

/* 背景色切り替え */
.bg-before{background:linear-gradient(160deg,#fff8e7 0%,#fef3c7 100%);transition:background .5s}
.bg-after{background:linear-gradient(160deg,#1e3a5f 0%,#0a1628 100%);transition:background .5s}
.bg-after .type-card{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:#fff}
.bg-after .type-card.active{border-color:#f59e0b;background:rgba(245,158,11,.15)}
.bg-after .type-label{color:#fff}
.bg-after .type-sub{color:rgba(255,255,255,.6)}
.bg-after .meter-card{background:rgba(255,255,255,.1);border:none}
.bg-after .meter-label{color:rgba(245,158,11,.9)}
.bg-after .meter-input{background:rgba(255,255,255,.08);border-color:#f59e0b;color:#fff}
.bg-after .meter-input::placeholder{color:rgba(255,255,255,.3)}
.bg-after .more-toggle{color:rgba(255,255,255,.5)}
.bg-after .more-detail{background:rgba(255,255,255,.08)}
.bg-after label{color:rgba(255,255,255,.7)}
.bg-after .input-field{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:#fff}
.bg-after .radio-btn{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.7)}
.bg-after .radio-btn.active{border-color:#f59e0b;background:rgba(245,158,11,.2);color:#fde68a}
.bg-after .today-section{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.bg-after .today-header{color:#fde68a;border-color:rgba(255,255,255,.1)}
.bg-after .today-detail{color:rgba(255,255,255,.6)}
.bg-after .empty{color:rgba(255,255,255,.4)}
.bg-after .month-nav{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.bg-after .month-label{color:#fff}
.bg-after .records-section{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.bg-after .records-header{color:#fde68a;border-color:rgba(255,255,255,.1)}
.bg-after .record-date{color:#fff}
.bg-after .record-detail{color:rgba(255,255,255,.6)}
.bg-after .badge-d.pending{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.5)}
.bg-after textarea{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:#fff}
.alc-badge.ok{background:#dcfce7;color:#166534}
.alc-badge.ng{background:#fee2e2;color:#991b1b}
</style>
</head>
<body>
<div class="header">
  <span class="header-title">📋 点呼記録</span>
  <button class="back-btn" onclick="window.location.href='home.html'">← ホーム</button>
</div>

<div class="main bg-before" id="main-bg">

  <!-- 今日の状況バッジ -->
  <div class="today-status">
    <span class="badge-d pending" id="badge-before">乗務前 未</span>
    <span class="badge-d pending" id="badge-after">乗務後 未</span>
  </div>

  <!-- 種別選択 -->
  <div class="type-wrap">
    <div class="type-card active" id="btn-before" onclick="setType('before')">
      <div class="type-icon">🌅</div>
      <div class="type-label">乗務前</div>
      <div class="type-sub">出発前</div>
    </div>
    <div class="type-card" id="btn-after" onclick="setType('after')">
      <div class="type-icon">🌙</div>
      <div class="type-label">乗務後</div>
      <div class="type-sub">帰着後</div>
    </div>
  </div>

  <!-- メーター入力 -->
  <div class="meter-card">
    <div class="meter-label">メーター値（km）</div>
    <input class="meter-input" type="text" inputmode="text" id="meter-val" placeholder="例：123456">
  </div>

  <!-- 送信ボタン -->
  <button class="send-btn" id="submit-btn" onclick="submitTenko()">🚚 点呼する</button>
  <div class="msg" id="msg" style="display:none"></div>

  <!-- 詳細折りたたみ -->
  <div class="more-toggle" onclick="toggleDetail()">▼ アルコール・健康状態を入力する</div>
  <div class="more-detail" id="more-detail">
    <label>アルコール検知値（mg/L）</label>
    <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem">
      <input type="text" inputmode="text" id="alcohol-val" placeholder="0.00" oninput="checkAlcohol()" style="margin-bottom:0;flex:1">
      <span class="alc-badge ok" id="alc-badge">正常</span>
    </div>

    <label>健康状態</label>
    <div class="radio-group" style="margin-bottom:.75rem">
      <div class="radio-btn active" id="h-good" onclick="setHealth('良好')">良好</div>
      <div class="radio-btn" id="h-normal" onclick="setHealth('普通')">普通</div>
      <div class="radio-btn" id="h-bad" onclick="setHealth('不良')">不良</div>
    </div>

    <label>疲労・睡眠</label>
    <div class="radio-group" style="margin-bottom:.75rem">
      <div class="radio-btn active" id="f-good" onclick="setFatigue('問題なし')">問題なし</div>
      <div class="radio-btn" id="f-tired" onclick="setFatigue('やや疲労')">やや疲労</div>
      <div class="radio-btn" id="f-bad" onclick="setFatigue('疲労あり')">疲労あり</div>
    </div>

    <label>特記事項</label>
    <textarea id="notes" placeholder="特記事項があれば入力してください"></textarea>
  </div>

  <!-- 今日の点呼記録 -->
  <div class="today-section">
    <div class="today-header">今日の点呼記録</div>
    <div id="today-list"><div class="loading">読込中...</div></div>
  </div>

  <!-- 月別記録 -->
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">◀</button>
    <span class="month-label" id="month-label">-</span>
    <button class="month-btn" onclick="changeMonth(1)">▶</button>
  </div>
  <div class="records-section">
    <div class="records-header">
      <span>月別点呼記録</span>
      <button class="csv-btn" onclick="exportCSV()">CSV出力</button>
    </div>
    <div id="month-list"><div class="loading">読込中...</div></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL='https://atezlxzzsfmabmkigqpg.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0ZXpseHp6c2ZtYWJta2lncXBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTgzMTgsImV4cCI6MjA5NTY3NDMxOH0.uN-517Q9wXyu7_MPzcOn6TfLBsEwnMThy65BUlfBEr4';
var sb=window.supabase.createClient(SURL,SKEY);
var userId=null;
var tenkoType='before';
var healthStatus='良好';
var fatigueStatus='問題なし';
var todayRecords={before:null,after:null};
var currentDate=new Date();
var monthRecords=[];
var detailOpen=false;

function getTodayJST(){
  var jst=new Date(new Date().getTime()+9*60*60*1000);
  return jst.toISOString().split('T')[0];
}

function getMonthRange(){
  var y=currentDate.getFullYear();
  var m=currentDate.getMonth();
  return{
    from:new Date(y,m,1).toISOString().split('T')[0],
    to:new Date(y,m+1,0).toISOString().split('T')[0],
    label:y+'年'+(m+1)+'月'
  };
}

function changeMonth(d){
  currentDate.setMonth(currentDate.getMonth()+d);
  var range=getMonthRange();
  document.getElementById('month-label').textContent=range.label;
  loadMonthRecords();
}

function toggleDetail(){
  detailOpen=!detailOpen;
  var el=document.getElementById('more-detail');
  var toggle=document.querySelector('.more-toggle');
  el.classList.toggle('open',detailOpen);
  toggle.textContent=detailOpen?'▲ 詳細を閉じる':'▼ アルコール・健康状態を入力する';
}

async function init(){
  var {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  userId=session.user.id;
  var range=getMonthRange();
  document.getElementById('month-label').textContent=range.label;
  loadToday();
  loadMonthRecords();
}

async function loadToday(){
  var today=getTodayJST();
  var {data:records}=await sb.from('tenko_records').select('*').eq('user_id',userId).eq('date',today).order('created_at',{ascending:false});
  todayRecords.before=records&&records.find(r=>r.tenko_type==='乗務前')||null;
  todayRecords.after=records&&records.find(r=>r.tenko_type==='乗務後')||null;

  // バッジ更新
  var bb=document.getElementById('badge-before');
  var ba=document.getElementById('badge-after');
  if(todayRecords.before){bb.textContent='乗務前 ✓';bb.className='badge-d done';}
  else{bb.textContent='乗務前 未';bb.className='badge-d pending';}
  if(todayRecords.after){ba.textContent='乗務後 ✓';ba.className='badge-d done';}
  else{ba.textContent='乗務後 未';ba.className='badge-d pending';}

  var el=document.getElementById('today-list');
  var items=[todayRecords.before,todayRecords.after].filter(Boolean);
  if(items.length===0){el.innerHTML='<div class="empty">まだ記録がありません</div>';return;}
  el.innerHTML=items.map(r=>{
    var typeBadge=r.tenko_type==='乗務前'?'<span class="badge before">乗務前</span>':'<span class="badge after">乗務後</span>';
    var timeVal=r.updated_at||r.created_at;
    var time=timeVal?new Date(timeVal).toLocaleString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'';
    return '<div class="today-item"><div class="today-type">'+typeBadge+' <span class="badge done">送信済</span></div><div class="today-detail">アルコール: '+(r.alcohol_value||0)+' mg/L　健康: '+(r.health_status||'-')+'　疲労: '+(r.fatigue_status||'-')+'<br>メーター: '+(r.meter_value||'-')+' km　送信: '+time+(r.notes?'<br>特記: '+r.notes:'')+'</div></div>';
  }).join('');
}

async function loadMonthRecords(){
  var {from,to}=getMonthRange();
  var {data}=await sb.from('tenko_records').select('*').eq('user_id',userId).gte('date',from).lte('date',to).order('date',{ascending:false});
  monthRecords=data||[];
  renderMonthList();
}

function renderMonthList(){
  var el=document.getElementById('month-list');
  if(monthRecords.length===0){el.innerHTML='<div class="empty">記録がありません</div>';return;}
  var grouped={};
  monthRecords.forEach(r=>{
    if(!grouped[r.date]) grouped[r.date]=[];
    grouped[r.date].push(r);
  });
  el.innerHTML=Object.keys(grouped).sort().reverse().map(date=>{
    var items=grouped[date];
    var details=items.map(r=>{
      var typeBadge=r.tenko_type==='乗務前'?'<span class="badge before">乗務前</span>':'<span class="badge after">乗務後</span>';
      var timeVal=r.updated_at||r.created_at;
      var time=timeVal?new Date(timeVal).toLocaleString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'-';
      return typeBadge+' アルコール:'+(r.alcohol_value||0)+' 健康:'+(r.health_status||'-')+' 疲労:'+(r.fatigue_status||'-')+' '+time;
    }).join('<br>');
    return '<div class="record-item"><div class="record-date">'+date+'</div><div class="record-detail">'+details+'</div></div>';
  }).join('');
}

function exportCSV(){
  if(monthRecords.length===0){alert('データがありません');return;}
  var headers=['日付','種別','アルコール(mg/L)','メーター(km)','健康状態','疲労・睡眠','特記事項','送信時刻'];
  var rows=monthRecords.map(r=>{
    var timeVal=r.updated_at||r.created_at;
    var time=timeVal?new Date(timeVal).toLocaleString('ja-JP'):'';
    return[r.date,r.tenko_type,r.alcohol_value||0,r.meter_value||'',r.health_status||'',r.fatigue_status||'',r.notes||'',time]
      .map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  var {label}=getMonthRange();
  var csv='\uFEFF'+headers.join(',')+'\n'+rows.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='点呼記録_'+label+'.csv';a.click();
  URL.revokeObjectURL(url);
}

function setType(t){
  tenkoType=t;
  document.getElementById('btn-before').classList.toggle('active',t==='before');
  document.getElementById('btn-after').classList.toggle('active',t==='after');
  var bg=document.getElementById('main-bg');
  if(t==='before'){
    bg.className='main bg-before';
  } else {
    bg.className='main bg-after';
  }
}

function checkAlcohol(){
  var v=parseFloat(document.getElementById('alcohol-val').value)||0;
  var badge=document.getElementById('alc-badge');
  if(v>=0.15){badge.className='alc-badge ng';badge.textContent='要確認';}
  else{badge.className='alc-badge ok';badge.textContent='正常';}
}

function setHealth(v){
  healthStatus=v;
  ['h-good','h-normal','h-bad'].forEach(id=>document.getElementById(id).className='radio-btn');
  var map={'良好':'h-good','普通':'h-normal','不良':'h-bad'};
  document.getElementById(map[v]).className=v==='不良'?'radio-btn ng-active':'radio-btn active';
}

function setFatigue(v){
  fatigueStatus=v;
  ['f-good','f-tired','f-bad'].forEach(id=>document.getElementById(id).className='radio-btn');
  var map={'問題なし':'f-good','やや疲労':'f-tired','疲労あり':'f-bad'};
  document.getElementById(map[v]).className=v==='疲労あり'?'radio-btn ng-active':'radio-btn active';
}

async function submitTenko(){
  var btn=document.getElementById('submit-btn');
  var msg=document.getElementById('msg');
  btn.disabled=true;

  var today=getTodayJST();
  var ttype=tenkoType==='before'?'乗務前':'乗務後';
  var existing=tenkoType==='before'?todayRecords.before:todayRecords.after;

  var meterStr=document.getElementById('meter-val').value.trim();
  var alcStr=document.getElementById('alcohol-val').value.trim();

  if(meterStr&&!/^[0-9.]+$/.test(meterStr)){
    showMsg('メーター値は半角数字で入力してください','err');
    document.getElementById('meter-val').value='';btn.disabled=false;return;
  }
  if(alcStr&&!/^[0-9.]+$/.test(alcStr)){
    showMsg('アルコール値は半角数字で入力してください','err');
    document.getElementById('alcohol-val').value='';btn.disabled=false;return;
  }

  var record={
    tenko_type:ttype,
    method:'セルフ',
    alcohol_value:parseFloat(alcStr)||0,
    meter_value:parseInt(meterStr)||null,
    health_status:healthStatus,
    fatigue_status:fatigueStatus,
    notes:document.getElementById('notes').value,
  };

  var error;
  if(existing){
    var res=await sb.from('tenko_records').update(record).eq('id',existing.id);
    error=res.error;
  } else {
    record.user_id=userId;
    record.date=today;
    var res2=await sb.from('tenko_records').insert(record);
    error=res2.error;
  }

  if(error){
    showMsg('エラー: '+error.message,'err');
    btn.disabled=false;return;
  }

  showMsg(existing?'送信し直しました！':'点呼を送信しました！','ok');
  document.getElementById('meter-val').value='';
  document.getElementById('alcohol-val').value='';
  document.getElementById('notes').value='';
  checkAlcohol();setHealth('良好');setFatigue('問題なし');
  btn.disabled=false;
  loadToday();
  loadMonthRecords();
  setTimeout(()=>{msg.style.display='none';},3000);
}

function showMsg(text,type){
  var el=document.getElementById('msg');
  el.textContent=text;
  el.className='msg '+type;
  el.style.display='block';
}

init();
</script>
