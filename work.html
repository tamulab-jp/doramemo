<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠管理 — ドラメモ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans',sans-serif;background:#f7f4f0;min-height:100vh;color:#0f1c35}
.header{background:#f59e0b;padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:1rem;font-weight:700;color:#fff}
.back-btn{background:rgba(255,255,255,.2);border:none;border-radius:6px;padding:5px 12px;font-size:.78rem;color:#fff;cursor:pointer}
.main{max-width:480px;margin:0 auto;padding:1rem}

.month-nav{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:1rem;background:#fff;border-radius:12px;border:1px solid #fde68a;padding:.875rem}
.month-btn{background:#fef3c7;border:none;border-radius:6px;padding:5px 12px;font-size:.85rem;cursor:pointer;color:#92400e;font-weight:700}
.month-label{font-size:.9rem;font-weight:700}

.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:1rem}
.summary-card{background:#fff;border-radius:12px;border:1px solid #fde68a;padding:1rem;text-align:center}
.summary-label{font-size:.7rem;color:#7a8a9e;margin-bottom:4px}
.summary-value{font-size:1.1rem;font-weight:700;color:#92400e}

.card{background:#fff;border-radius:12px;border:1px solid #fde68a;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:.78rem;font-weight:700;color:#92400e;margin-bottom:1rem;text-transform:uppercase;letter-spacing:.5px}

label{font-size:.85rem;color:#5a6a82;display:block;margin-bottom:5px}
input[type=text],input[type=number],input[type=time]{width:100%;border:1.5px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:.9rem;color:#0f1c35;outline:none;background:#fff;margin-bottom:1rem}
input:focus{border-color:#f59e0b}

.time-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.submit-btn{width:100%;background:#f59e0b;color:#fff;border:none;border-radius:10px;padding:12px;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s}
.submit-btn:hover{background:#d97706}
.msg{font-size:.82rem;text-align:center;margin-top:.75rem;padding:.5rem;border-radius:6px}
.msg.ok{background:#dcfce7;color:#166534}
.msg.err{background:#fee2e2;color:#991b1b}

.records-section{background:#fff;border-radius:12px;border:1px solid #fde68a;overflow:hidden;margin-bottom:1rem}
.records-header{padding:.875rem 1.25rem;border-bottom:1px solid #fef3c7;font-size:.85rem;font-weight:700;color:#92400e;display:flex;justify-content:space-between;align-items:center}
.record-item{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-bottom:1px solid #fef9ee}
.record-item:last-child{border-bottom:none}
.record-date{font-size:.82rem;font-weight:700;color:#0f1c35;margin-bottom:2px}
.record-time{font-size:.75rem;color:#7a8a9e}
.record-hours{font-size:.95rem;font-weight:700;color:#92400e}
.del-btn{background:none;border:none;color:#fca5a5;cursor:pointer;font-size:.8rem;margin-left:.5rem}
.del-btn:hover{color:#e24b4a}
.empty{padding:2rem;text-align:center;color:#7a8a9e;font-size:.82rem}
.loading{padding:2rem;text-align:center;color:#7a8a9e;font-size:.82rem}
.csv-btn{background:#fff;border:1.5px solid #f59e0b;color:#92400e;border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:700;cursor:pointer}
.mic-row{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem}.mic-row input{margin-bottom:0;flex:1}.mic-btn{background:#fef3c7;border:1.5px solid #f59e0b;border-radius:8px;padding:10px 12px;font-size:1.1rem;cursor:pointer;flex-shrink:0}.mic-btn.listening{background:#fee2e2;border-color:#e24b4a;animation:pulse .8s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.mic-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0f1c35;color:#fff;padding:.5rem 1.25rem;border-radius:20px;font-size:.82rem;z-index:999;opacity:0;transition:opacity .3s}.mic-toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <span class="header-title">⏰ 勤怠管理</span>
  <button class="back-btn" onclick="window.location.href='home.html'">← ホーム</button>
</div>

<div class="main">

  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">◀</button>
    <span class="month-label" id="month-label">-</span>
    <button class="month-btn" onclick="changeMonth(1)">▶</button>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label">稼働日数</div>
      <div class="summary-value" id="sum-days">0日</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">総稼働時間</div>
      <div class="summary-value" id="sum-hours">0h</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">平均稼働</div>
      <div class="summary-value" id="sum-avg">0h</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">稼働時間を記録</div>
    <label>日付</label>
    <input type="text" id="work-date" placeholder="例：2026-05-30">
    <div class="time-row">
      <div>
        <label>開始時刻</label>
        <input type="time" id="start-time">
      </div>
      <div>
        <label>終了時刻</label>
        <input type="time" id="end-time">
      </div>
    </div>
    <label>休憩時間（分）</label>
    <div class="mic-row">
      <input type="number" id="break-min" placeholder="例：60" min="0" value="60">
      <button class="mic-btn" id="mic-break" onclick="startMic('break-min','mic-break',null)" title="音声入力">🎤</button>
    </div>
    <label>メモ</label>
    <input type="text" id="memo" placeholder="メモ（任意）">
    <button class="submit-btn" onclick="addRecord()">記録する</button>
    <div class="msg" id="msg" style="display:none"></div>
  </div>

  <div class="records-section">
    <div class="records-header">
      <span>稼働記録</span>
      <button class="csv-btn" onclick="exportCSV()">CSV出力</button>
    </div>
    <div id="records-list"><div class="loading">読込中...</div></div>
  </div>

</div>

<div class="mic-toast" id="mic-toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
function startMic(inputId,btnId,callback){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('音声認識はこのブラウザでは使えません');return;}
  var btn=document.getElementById(btnId);
  var input=document.getElementById(inputId);
  var recognition=new SR();
  recognition.lang='ja-JP';recognition.interimResults=false;
  btn.classList.add('listening');showToast('話しかけてください...');
  recognition.start();
  recognition.onresult=function(e){
    var t=e.results[0][0].transcript;
    var num=t.replace(/[^0-9.]/g,'');
    if(num){input.value=num;input.dispatchEvent(new Event('input'));if(callback)callback();showToast('「'+t+'」→ '+num);}
    else showToast('数字が認識できませんでした');
    btn.classList.remove('listening');
  };
  recognition.onerror=function(e){showToast('エラー: '+e.error);btn.classList.remove('listening');};
  recognition.onend=function(){btn.classList.remove('listening');};
}
function showToast(msg){
  var el=document.getElementById('mic-toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2500);
}
var SURL='https://atezlxzzsfmabmkigqpg.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0ZXpseHp6c2ZtYWJta2lncXBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTgzMTgsImV4cCI6MjA5NTY3NDMxOH0.uN-517Q9wXyu7_MPzcOn6TfLBsEwnMThy65BUlfBEr4';
var sb=window.supabase.createClient(SURL,SKEY);
var userId=null;
var currentDate=new Date();
var allRecords=[];

function getTodayJST(){
  var jst=new Date(new Date().getTime()+9*60*60*1000);
  return jst.toISOString().split('T')[0];
}
function getMonthRange(){
  var y=currentDate.getFullYear();
  var m=currentDate.getMonth();
  return{
    from:new Date(y,m,1).toISOString().split('T')[0],
    to:new Date(y,m+1,0).toISOString().split('T')[0],
    label:y+'年'+(m+1)+'月'
  };
}

function calcHours(start,end,breakMin){
  if(!start||!end) return 0;
  var s=start.split(':').map(Number);
  var e=end.split(':').map(Number);
  var mins=(e[0]*60+e[1])-(s[0]*60+s[1])-(breakMin||0);
  return Math.max(0,mins/60);
}

async function init(){
  var {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  userId=session.user.id;
  var range=getMonthRange();
  document.getElementById('month-label').textContent=range.label;
  document.getElementById('work-date').value=getTodayJST();
  loadRecords();
}

function changeMonth(d){
  currentDate.setMonth(currentDate.getMonth()+d);
  var range=getMonthRange();
  document.getElementById('month-label').textContent=range.label;
  loadRecords();
}

async function loadRecords(){
  var {from,to}=getMonthRange();
  var {data}=await sb.from('work_records').select('*').eq('user_id',userId).gte('date',from).lte('date',to).order('date',{ascending:false});
  allRecords=data||[];
  updateSummary();
  renderList();
}

function updateSummary(){
  var days=allRecords.length;
  var totalHours=allRecords.reduce((s,r)=>s+calcHours(r.start_time,r.end_time,r.break_minutes),0);
  var avg=days>0?totalHours/days:0;
  document.getElementById('sum-days').textContent=days+'日';
  document.getElementById('sum-hours').textContent=totalHours.toFixed(1)+'h';
  document.getElementById('sum-avg').textContent=avg.toFixed(1)+'h';
}

function renderList(){
  var el=document.getElementById('records-list');
  if(allRecords.length===0){el.innerHTML='<div class="empty">記録がありません</div>';return;}
  el.innerHTML=allRecords.map(r=>{
    var hours=calcHours(r.start_time,r.end_time,r.break_minutes);
    return `<div class="record-item">
      <div>
        <div class="record-date">${r.date||'-'}</div>
        <div class="record-time">${r.start_time||'-'} 〜 ${r.end_time||'-'}（休憩${r.break_minutes||0}分）</div>
        ${r.memo?`<div class="record-time">${r.memo}</div>`:''}
      </div>
      <div style="display:flex;align-items:center">
        <span class="record-hours">${hours.toFixed(1)}h</span>
        <button class="del-btn" onclick="deleteRecord('${r.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function addRecord(){
  var date=document.getElementById('work-date').value;
  var start=document.getElementById('start-time').value;
  var end=document.getElementById('end-time').value;
  var breakMin=parseInt(document.getElementById('break-min').value)||0;
  var memo=document.getElementById('memo').value;
  var msg=document.getElementById('msg');
  if(!date||!start||!end){showMsg('日付・開始・終了時刻を入力してください','err');return;}
  var hours=calcHours(start,end,breakMin);
  if(hours<=0){showMsg('終了時刻が開始時刻より前になっています','err');return;}
  var {error}=await sb.from('work_records').insert({user_id:userId,date,start_time:start,end_time:end,break_minutes:breakMin,memo});
  if(error){showMsg('エラー: '+error.message,'err');return;}
  showMsg(hours.toFixed(1)+'時間を記録しました！','ok');
  document.getElementById('memo').value='';
  loadRecords();
  setTimeout(()=>{msg.style.display='none';},2000);
}

async function deleteRecord(id){
  if(!confirm('削除しますか？')){return;}
  await sb.from('work_records').delete().eq('id',id);
  loadRecords();
}

function exportCSV(){
  if(allRecords.length===0){alert('データがありません');return;}
  var headers=['日付','開始','終了','休憩(分)','稼働時間(h)','メモ'];
  var rows=allRecords.map(r=>{
    var h=calcHours(r.start_time,r.end_time,r.break_minutes);
    return[r.date,r.start_time,r.end_time,r.break_minutes,h.toFixed(1),r.memo||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  var {label}=getMonthRange();
  var csv='\uFEFF'+headers.join(',')+'\n'+rows.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='勤怠_'+label+'.csv';a.click();
  URL.revokeObjectURL(url);
}

function showMsg(text,type){
  var el=document.getElementById('msg');
  el.textContent=text;el.className='msg '+type;el.style.display='block';
}

init();
</script>

<div style="text-align:center;padding:1.5rem 0 2rem;font-size:.7rem;color:#b0bac8;">ドラメモ v1.1.2</div>
</body>
</html>
