<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務記録 — ドラメモ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans',sans-serif;background:#f7f4f0;min-height:100vh;color:#0f1c35}
.header{background:#f59e0b;padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:1rem;font-weight:700;color:#fff}
.back-btn{background:rgba(255,255,255,.2);border:none;border-radius:6px;padding:5px 12px;font-size:.78rem;color:#fff;cursor:pointer}
.main{max-width:480px;margin:0 auto;padding:1rem}

.date-nav{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:1rem;background:#fff;border-radius:12px;border:1px solid #fde68a;padding:.875rem}
.date-btn{background:#fef3c7;border:none;border-radius:6px;padding:5px 12px;font-size:.85rem;cursor:pointer;color:#92400e;font-weight:700}
.date-label{font-size:.9rem;font-weight:700}

.job-card{background:#fff;border-radius:14px;border:1px solid #fde68a;margin-bottom:1rem;overflow:hidden}
.job-header{background:#fef3c7;padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.job-no{font-size:.82rem;font-weight:700;color:#92400e;display:flex;align-items:center;gap:.5rem}
.incomplete-badge{font-size:.68rem;background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:10px;font-weight:700}
.job-del{background:none;border:none;color:#fca5a5;font-size:.8rem;cursor:pointer}

.point-block{padding:1rem 1.25rem}
.point-title{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}
.point-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.point-dot.start{background:#f59e0b}
.point-dot.end{background:#0a1628}
.point-label{font-size:.78rem;font-weight:700}
.point-label.start{color:#92400e}
.point-label.end{color:#0a1628}

.input-group{display:flex;flex-direction:column;gap:3px;margin-bottom:.5rem}
.input-label{font-size:.7rem;color:#7a8a9e}
.input-field{border:1.5px solid #fde68a;border-radius:8px;padding:8px 10px;font-size:.88rem;color:#0f1c35;outline:none;background:#fff;width:100%}
.input-field:focus{border-color:#f59e0b}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.time-row{display:flex;gap:.5rem;align-items:flex-end}
.time-row .input-group{flex:1;margin-bottom:0}
.nextday-btn{background:#f7f4f0;border:1.5px solid #ddd;border-radius:8px;padding:8px 10px;font-size:.72rem;font-weight:700;color:#7a8a9e;cursor:pointer;white-space:nowrap;flex-shrink:0}
.nextday-btn.active{background:#fef3c7;border-color:#f59e0b;color:#92400e}

.divider{display:flex;align-items:center;padding:0 1.25rem;gap:.5rem;margin:.25rem 0}
.divider-line{flex:1;border-top:1.5px dashed #fde68a}
.divider-icon{font-size:.9rem;color:#f59e0b}

.distance-summary{background:#fef9ee;margin:.5rem 1.25rem 1rem;border-radius:8px;padding:.625rem 1rem;display:flex;justify-content:space-between;align-items:center}
.distance-label{font-size:.72rem;color:#92400e}
.distance-value{font-size:.9rem;font-weight:700;color:#92400e}

.save-job-btn{width:calc(100% - 2.5rem);margin:0 1.25rem 1rem;background:#0a1628;color:#fff;border:none;border-radius:8px;padding:10px;font-size:.85rem;font-weight:700;cursor:pointer}
.save-job-btn:disabled{opacity:.5}

.add-job-btn{width:100%;background:#fff;border:2px dashed #f59e0b;border-radius:14px;padding:1rem;font-size:.88rem;font-weight:700;color:#f59e0b;cursor:pointer;margin-bottom:1rem}
.add-job-btn:hover{background:#fef9ee}

.msg{font-size:.82rem;text-align:center;padding:.5rem;border-radius:6px;margin-bottom:.75rem}
.msg.ok{background:#dcfce7;color:#166534}
.msg.err{background:#fee2e2;color:#991b1b}

.history-section{background:#fff;border-radius:12px;border:1px solid #fde68a;overflow:hidden;margin-bottom:1rem}
.history-header{padding:.875rem 1.25rem;border-bottom:1px solid #fef3c7;font-size:.85rem;font-weight:700;color:#92400e;display:flex;justify-content:space-between;align-items:center}
.history-day{padding:.875rem 1.25rem;border-bottom:1px solid #fef9ee}
.history-day:last-child{border-bottom:none}
.history-date{font-size:.82rem;font-weight:700;margin-bottom:4px;color:#0f1c35}
.history-job{font-size:.75rem;color:#7a8a9e;line-height:1.8;padding-left:.5rem;border-left:2px solid #fde68a;margin-bottom:.25rem}
.history-job:last-child{margin-bottom:0}
.csv-btn{background:#fff;border:1.5px solid #f59e0b;color:#92400e;border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:700;cursor:pointer}
.empty{padding:2rem;text-align:center;color:#7a8a9e;font-size:.82rem}

.loading{padding:2rem;text-align:center;color:#7a8a9e;font-size:.82rem}
</style>
</head>
<body>
<div class="header">
  <span class="header-title">📝 業務記録</span>
  <button class="back-btn" onclick="window.location.href='home.html'">← ホーム</button>
</div>

<div class="main">
  <div class="date-nav">
    <button class="date-btn" onclick="changeDate(-1)">◀</button>
    <span class="date-label" id="date-label">-</span>
    <button class="date-btn" onclick="changeDate(1)">▶</button>
  </div>

  <div id="jobs-container"></div>
  <div class="msg" id="msg" style="display:none"></div>
  <button class="add-job-btn" onclick="addJob()">＋ 案件を追加する</button>

  <div class="history-section">
    <div class="history-header">
      <span>過去の業務記録</span>
      <button class="csv-btn" onclick="exportCSV()">CSV出力</button>
    </div>
    <div id="history-list"><div class="loading">読込中...</div></div>
  </div>
</div>

<div style="text-align:center;padding:1.5rem 0 2rem;font-size:.7rem;color:#b0bac8;">ドラメモ v1.2</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL='https://atezlxzzsfmabmkigqpg.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0ZXpseHp6c2ZtYWJta2lncXBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTgzMTgsImV4cCI6MjA5NTY3NDMxOH0.uN-517Q9wXyu7_MPzcOn6TfLBsEwnMThy65BUlfBEr4';
var sb=window.supabase.createClient(SURL,SKEY);
var userId=null;
var currentDate=new Date();
var todayJobs=[]; // 今日のDB上の記録
var historyRecords=[];

function getDateStr(d){
  var jst=new Date(d.getTime()+9*60*60*1000);
  return jst.toISOString().split('T')[0];
}
function getDateLabel(d){
  var jst=new Date(d.getTime()+9*60*60*1000);
  var y=jst.getUTCFullYear();
  var m=jst.getUTCMonth()+1;
  var day=jst.getUTCDate();
  var w=['日','月','火','水','木','金','土'][jst.getUTCDay()];
  return y+'年'+m+'月'+day+'日（'+w+'）';
}

async function init(){
  var {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  userId=session.user.id;
  updateDateLabel();
  await loadToday();
  await loadHistory();
}

function updateDateLabel(){
  document.getElementById('date-label').textContent=getDateLabel(currentDate);
}

async function changeDate(d){
  currentDate.setDate(currentDate.getDate()+d);
  updateDateLabel();
  await loadToday();
}

async function loadToday(){
  var dateStr=getDateStr(currentDate);
  var {data}=await sb.from('gyomu_records').select('*').eq('user_id',userId).eq('date',dateStr).order('job_no');
  todayJobs=data||[];
  renderJobs();
}

async function loadHistory(){
  var {data}=await sb.from('gyomu_records').select('*').eq('user_id',userId).order('date',{ascending:false}).order('job_no');
  historyRecords=data||[];
  renderHistory();
}

function renderJobs(){
  var container=document.getElementById('jobs-container');
  if(todayJobs.length===0){
    container.innerHTML='';
    return;
  }
  container.innerHTML=todayJobs.map((job,i)=>jobCardHTML(job,i+1)).join('');
}

function jobCardHTML(job,no){
  var incomplete=!job.end_place&&!job.end_time?'<span class="incomplete-badge">到着未入力</span>':'';
  var dist='';
  if(job.start_meter&&job.end_meter&&job.end_meter>job.start_meter){
    dist='<div class="distance-summary"><span class="distance-label">走行距離</span><span class="distance-value">'+(job.end_meter-job.start_meter)+' km</span></div>';
  }
  return `<div class="job-card" id="job-${job.id}">
    <div class="job-header">
      <span class="job-no">📦 案件 ${no} ${incomplete}</span>
      <button class="job-del" onclick="deleteJob('${job.id}')">✕ 削除</button>
    </div>
    <div class="point-block">
      <div class="point-title"><div class="point-dot start"></div><span class="point-label start">出発地点</span></div>
      <div class="input-group"><span class="input-label">場所の名前</span><input class="input-field" type="text" id="sp-${job.id}" value="${job.start_place||''}" placeholder="例：厚木センター"></div>
      <div class="input-row">
        <div class="input-group"><span class="input-label">出発時刻</span><input class="input-field" type="time" id="st-${job.id}" value="${job.start_time||''}"></div>
        <div class="input-group"><span class="input-label">メーター（km）</span><input class="input-field" type="text" inputmode="text" id="sm-${job.id}" value="${job.start_meter||''}" placeholder="123456"></div>
      </div>
    </div>
    <div class="divider"><div class="divider-line"></div><span class="divider-icon">🚚</span><div class="divider-line"></div></div>
    <div class="point-block">
      <div class="point-title"><div class="point-dot end"></div><span class="point-label end">到着地点</span></div>
      <div class="input-group"><span class="input-label">場所の名前</span><input class="input-field" type="text" id="ep-${job.id}" value="${job.end_place||''}" placeholder="例：横浜配送センター"></div>
      <div class="input-row">
        <div class="input-group">
          <span class="input-label">到着時刻</span>
          <div class="time-row">
            <div class="input-group"><input class="input-field" type="time" id="et-${job.id}" value="${job.end_time||''}"></div>
            <button class="nextday-btn${job.next_day?' active':''}" id="nd-${job.id}" onclick="toggleNextDay('${job.id}')">翌日${job.next_day?' ✓':''}</button>
          </div>
        </div>
        <div class="input-group"><span class="input-label">メーター（km）</span><input class="input-field" type="text" inputmode="text" id="em-${job.id}" value="${job.end_meter||''}" placeholder="123512"></div>
      </div>
    </div>
    ${dist}
    <button class="save-job-btn" onclick="saveJob('${job.id}')">💾 この案件を保存</button>
  </div>`;
}

function toggleNextDay(id){
  var job=todayJobs.find(j=>j.id===id);
  if(!job) return;
  job.next_day=!job.next_day;
  var btn=document.getElementById('nd-'+id);
  btn.className='nextday-btn'+(job.next_day?' active':'');
  btn.textContent='翌日'+(job.next_day?' ✓':'');
}

async function addJob(){
  var dateStr=getDateStr(currentDate);
  var nextNo=(todayJobs.length>0?Math.max(...todayJobs.map(j=>j.job_no)):0)+1;
  var {data,error}=await sb.from('gyomu_records').insert({
    user_id:userId,date:dateStr,job_no:nextNo
  }).select().single();
  if(error){showMsg('エラー: '+error.message,'err');return;}
  todayJobs.push(data);
  renderJobs();
  showMsg('案件'+nextNo+'を追加しました','ok');
}

async function saveJob(id){
  var job=todayJobs.find(j=>j.id===id);
  if(!job) return;

  var sp=document.getElementById('sp-'+id).value.trim();
  var st=document.getElementById('st-'+id).value.trim();
  var smStr=document.getElementById('sm-'+id).value.trim();
  var ep=document.getElementById('ep-'+id).value.trim();
  var et=document.getElementById('et-'+id).value.trim();
  var emStr=document.getElementById('em-'+id).value.trim();

  // メーターバリデーション
  if(smStr&&!/^[0-9]+$/.test(smStr)){showMsg('出発メーターは半角数字で入力してください','err');return;}
  if(emStr&&!/^[0-9]+$/.test(emStr)){showMsg('到着メーターは半角数字で入力してください','err');return;}

  var updates={
    start_place:sp||null,
    start_time:st||null,
    start_meter:smStr?parseInt(smStr):null,
    end_place:ep||null,
    end_time:et||null,
    end_meter:emStr?parseInt(emStr):null,
    next_day:job.next_day||false,
  };

  var {error}=await sb.from('gyomu_records').update(updates).eq('id',id);
  if(error){showMsg('エラー: '+error.message,'err');return;}

  Object.assign(job,updates);
  renderJobs();
  showMsg('保存しました！','ok');
  loadHistory();
}

async function deleteJob(id){
  if(!confirm('この案件を削除しますか？')) return;
  var {error}=await sb.from('gyomu_records').delete().eq('id',id);
  if(error){showMsg('エラー: '+error.message,'err');return;}
  todayJobs=todayJobs.filter(j=>j.id!==id);
  // job_no を振り直し
  todayJobs.forEach((j,i)=>{j.job_no=i+1;});
  renderJobs();
  loadHistory();
}

function renderHistory(){
  var el=document.getElementById('history-list');
  if(historyRecords.length===0){el.innerHTML='<div class="empty">記録がありません</div>';return;}
  var grouped={};
  historyRecords.forEach(r=>{
    if(!grouped[r.date]) grouped[r.date]=[];
    grouped[r.date].push(r);
  });
  el.innerHTML=Object.keys(grouped).sort().reverse().slice(0,30).map(date=>{
    var jobs=grouped[date];
    var jobHTML=jobs.map(j=>{
      var dist=j.start_meter&&j.end_meter&&j.end_meter>j.start_meter?'（'+(j.end_meter-j.start_meter)+'km）':'';
      var nd=j.next_day?'翌日':'';
      var incomplete=!j.end_place&&!j.end_time?'<span style="color:#e24b4a">到着未入力</span>':'';
      return '<div class="history-job">案件'+(j.job_no||'?')+': '+(j.start_place||'-')+' '+(j.start_time||'')+'→'+(j.end_place||'未入力')+' '+nd+(j.end_time||'')+dist+' '+incomplete+'</div>';
    }).join('');
    return '<div class="history-day"><div class="history-date">'+date+' — '+jobs.length+'件</div>'+jobHTML+'</div>';
  }).join('');
}

function exportCSV(){
  if(historyRecords.length===0){alert('データがありません');return;}
  var headers=['日付','案件No','出発地点','出発時刻','出発メーター','到着地点','到着時刻','翌日','到着メーター','走行距離'];
  var rows=historyRecords.map(r=>{
    var dist=r.start_meter&&r.end_meter?r.end_meter-r.start_meter:'';
    return[r.date,r.job_no,r.start_place||'',r.start_time||'',r.start_meter||'',r.end_place||'',r.end_time||'',r.next_day?'翌日':'',r.end_meter||'',dist]
      .map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  var csv='\uFEFF'+headers.join(',')+'\n'+rows.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='業務記録.csv';a.click();
  URL.revokeObjectURL(url);
}

function showMsg(text,type){
  var el=document.getElementById('msg');
  el.textContent=text;el.className='msg '+type;el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.display='none';},2500);
}

init();
</script>
</body>
</html>
