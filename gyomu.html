<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務記録 — ドラメモ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans',sans-serif;background:#f7f4f0;min-height:100vh;color:#0f1c35}
.header{background:#f59e0b;padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:1rem;font-weight:700;color:#fff}
.back-btn{background:rgba(255,255,255,.2);border:none;border-radius:6px;padding:5px 12px;font-size:.78rem;color:#fff;cursor:pointer}
.main{max-width:480px;margin:0 auto;padding:1rem}

.date-nav{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:.75rem;background:#fff;border-radius:12px;border:1px solid #fde68a;padding:.75rem}
.date-btn{background:#fef3c7;border:none;border-radius:6px;padding:5px 12px;font-size:.85rem;cursor:pointer;color:#92400e;font-weight:700}
.date-label{font-size:.9rem;font-weight:700}

.job-card{background:#fff;border-radius:14px;border:1px solid #fde68a;margin-bottom:.75rem;overflow:hidden}
.job-header{background:#fef3c7;padding:.5rem .875rem;display:flex;align-items:center;justify-content:space-between}
.job-header-left{display:flex;align-items:center;gap:.5rem;flex:1}
.job-no{font-size:.78rem;font-weight:700;color:#92400e;white-space:nowrap}
.job-name-input{border:1px solid #fde68a;border-radius:6px;padding:3px 8px;font-size:.78rem;color:#92400e;background:#fff8e7;width:110px;outline:none}
.job-name-input:focus{border-color:#f59e0b}
.incomplete-badge{font-size:.65rem;background:#fee2e2;color:#991b1b;padding:2px 6px;border-radius:10px;font-weight:700;white-space:nowrap}
.job-del{background:none;border:none;color:#fca5a5;font-size:.75rem;cursor:pointer;padding:0 4px}

.job-body{padding:.75rem .875rem}
.point-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem}
.point-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.point-dot.start{background:#f59e0b}
.point-dot.end{background:#0a1628}
.field-place{flex:1;border:1px solid #fde68a;border-radius:6px;padding:5px 7px;font-size:.8rem;color:#0f1c35;outline:none;min-width:0}
.field-place:focus{border-color:#f59e0b}
.field-time{border:1px solid #fde68a;border-radius:6px;padding:5px 4px;font-size:.78rem;color:#0f1c35;outline:none;width:88px;flex-shrink:0}
.field-time:focus{border-color:#f59e0b}
.field-meter{border:1px solid #fde68a;border-radius:6px;padding:5px 5px;font-size:.78rem;color:#0f1c35;outline:none;width:65px;flex-shrink:0;text-align:center}
.field-meter:focus{border-color:#f59e0b}

.job-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.5rem}
.nextday-check{display:flex;align-items:center;gap:4px;font-size:.72rem;color:#7a8a9e;cursor:pointer}
.nextday-check input{cursor:pointer}
.distance-text{font-size:.72rem;color:#92400e;font-weight:700}
.save-job-btn{background:#0a1628;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:.72rem;font-weight:700;cursor:pointer}
.save-job-btn:disabled{opacity:.5}

.add-job-btn{width:100%;background:#fff;border:2px dashed #f59e0b;border-radius:14px;padding:.875rem;font-size:.88rem;font-weight:700;color:#f59e0b;cursor:pointer;margin-bottom:.75rem}
.add-job-btn:hover{background:#fef9ee}

.msg{font-size:.82rem;text-align:center;padding:.5rem;border-radius:6px;margin-bottom:.75rem}
.msg.ok{background:#dcfce7;color:#166534}
.msg.err{background:#fee2e2;color:#991b1b}

.history-section{background:#fff;border-radius:12px;border:1px solid #fde68a;overflow:hidden;margin-bottom:1rem}
.history-header{padding:.875rem 1.25rem;border-bottom:1px solid #fef3c7;font-size:.85rem;font-weight:700;color:#92400e;display:flex;justify-content:space-between;align-items:center}
.history-day{padding:.875rem 1.25rem;border-bottom:1px solid #fef9ee}
.history-day:last-child{border-bottom:none}
.history-date{font-size:.82rem;font-weight:700;margin-bottom:4px;color:#0f1c35}
.history-job{font-size:.75rem;color:#7a8a9e;line-height:1.8;padding-left:.5rem;border-left:2px solid #fde68a;margin-bottom:.25rem}
.history-job:last-child{margin-bottom:0}
.csv-btn{background:#fff;border:1.5px solid #f59e0b;color:#92400e;border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:700;cursor:pointer}
.empty{padding:2rem;text-align:center;color:#7a8a9e;font-size:.82rem}
.field-memo{width:100%;border:1px solid #fde68a;border-radius:6px;padding:5px 7px;font-size:.78rem;color:#0f1c35;outline:none;margin-top:.4rem}
.field-memo:focus{border-color:#f59e0b}
.loading{padding:2rem;text-align:center;color:#7a8a9e;font-size:.82rem}
</style>
</head>
<body>
<div class="header">
  <span class="header-title">📝 業務記録</span>
  <button class="back-btn" onclick="window.location.href='home.html'">← ホーム</button>
</div>

<div class="main">
  <div class="date-nav">
    <button class="date-btn" onclick="changeDate(-1)">◀</button>
    <span class="date-label" id="date-label">-</span>
    <button class="date-btn" onclick="changeDate(1)">▶</button>
  </div>

  <div id="jobs-container"></div>
  <div class="msg" id="msg" style="display:none"></div>
  <button class="add-job-btn" onclick="addJob()">＋ 案件を追加する</button>

  <div class="history-section">
    <div class="history-header">
      <span>過去の業務記録</span>
      <button class="csv-btn" onclick="exportCSV()">CSV出力</button>
    </div>
    <div id="history-list"><div class="loading">読込中...</div></div>
  </div>
</div>

<div style="text-align:center;padding:1.5rem 0 2rem;font-size:.7rem;color:#b0bac8;">ドラメモ v1.2</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL='https://atezlxzzsfmabmkigqpg.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0ZXpseHp6c2ZtYWJta2lncXBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTgzMTgsImV4cCI6MjA5NTY3NDMxOH0.uN-517Q9wXyu7_MPzcOn6TfLBsEwnMThy65BUlfBEr4';
var sb=window.supabase.createClient(SURL,SKEY);
var userId=null;
var currentDate=new Date();
var todayJobs=[];
var historyRecords=[];

function getDateStr(d){
  var jst=new Date(d.getTime()+9*60*60*1000);
  return jst.toISOString().split('T')[0];
}
function getDateLabel(d){
  var jst=new Date(d.getTime()+9*60*60*1000);
  var y=jst.getUTCFullYear();
  var m=jst.getUTCMonth()+1;
  var day=jst.getUTCDate();
  var w=['日','月','火','水','木','金','土'][jst.getUTCDay()];
  return y+'年'+m+'月'+day+'日（'+w+'）';
}
function getNowTimeJST(){
  var jst=new Date(new Date().getTime()+9*60*60*1000);
  var h=String(jst.getUTCHours()).padStart(2,'0');
  var m=String(jst.getUTCMinutes()).padStart(2,'0');
  return h+':'+m;
}

async function init(){
  var {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  userId=session.user.id;
  updateDateLabel();
  await loadToday();
  await loadHistory();
}

function updateDateLabel(){
  document.getElementById('date-label').textContent=getDateLabel(currentDate);
}

async function changeDate(d){
  currentDate.setDate(currentDate.getDate()+d);
  updateDateLabel();
  await loadToday();
}

async function loadToday(){
  var dateStr=getDateStr(currentDate);
  var {data}=await sb.from('gyomu_records').select('*').eq('user_id',userId).eq('date',dateStr).order('job_no');
  todayJobs=data||[];
  renderJobs();
}

async function loadHistory(){
  var {data}=await sb.from('gyomu_records').select('*').eq('user_id',userId).order('date',{ascending:false}).order('job_no');
  historyRecords=data||[];
  renderHistory();
}

function renderJobs(){
  var container=document.getElementById('jobs-container');
  if(todayJobs.length===0){container.innerHTML='';return;}
  container.innerHTML=todayJobs.map((job,i)=>jobCardHTML(job,i+1)).join('');
  // イベント設定
  todayJobs.forEach(job=>{
    // フォーカス時に全選択
    ['sp','sm','ep','em','memo'].forEach(prefix=>{
      var el=document.getElementById(prefix+'-'+job.id);
      if(el) el.addEventListener('focus',function(){this.select();});
    });
    // 時刻欄：長押しで現在時刻セット
    ['st','et'].forEach(prefix=>{
      var el=document.getElementById(prefix+'-'+job.id);
      if(!el) return;
      el.addEventListener('focus',function(){this.select();});
      var timer;
      el.addEventListener('touchstart',function(){
        timer=setTimeout(()=>{
          this.value=getNowTimeJST();
          showMsg('現在時刻をセットしました','ok');
        }.bind(this),600);
      });
      el.addEventListener('touchend',function(){clearTimeout(timer);});
      el.addEventListener('touchmove',function(){clearTimeout(timer);});
    });
    // 走行距離リアルタイム更新
    ['sm','em'].forEach(prefix=>{
      var el=document.getElementById(prefix+'-'+job.id);
      if(el) el.addEventListener('input',function(){updateDistance(job.id);});
    });
  });
}

function jobCardHTML(job,no){
  var incomplete=!job.end_place&&!job.end_time?'<span class="incomplete-badge">到着未入力</span>':'';
  var jobName=(job.job_name||'').replace(/"/g,'&quot;');
  var startPlace=(job.start_place||'').replace(/"/g,'&quot;');
  var endPlace=(job.end_place||'').replace(/"/g,'&quot;');
  var memoVal=(job.memo||'').replace(/"/g,'&quot;');
  var dist=job.start_meter&&job.end_meter&&job.end_meter>job.start_meter?(job.end_meter-job.start_meter)+' km':'-- km';
  var ndChecked=job.next_day?'checked':'';
  var html='<div class="job-card" id="job-'+job.id+'">';
  html+='<div class="job-header">';
  html+='<div class="job-header-left">';
  html+='<span class="job-no">案件 '+no+'</span>';
  html+='<input class="job-name-input" type="text" id="jn-'+job.id+'" value="'+jobName+'" placeholder="案件名（任意）" onfocus="this.select()">';
  html+=incomplete;
  html+='</div>';
  html+='<button class="job-del" onclick="deleteJob(''+job.id+'')">✕</button>';
  html+='</div>';
  html+='<div class="job-body">';
  html+='<div class="point-row">';
  html+='<div class="point-dot start"></div>';
  html+='<input class="field-place" type="text" id="sp-'+job.id+'" value="'+startPlace+'" placeholder="出発地点">';
  html+='<input class="field-time" type="time" id="st-'+job.id+'" value="'+(job.start_time||'')+'">';
  html+='<input class="field-meter" type="text" inputmode="text" id="sm-'+job.id+'" value="'+(job.start_meter||'')+'" placeholder="km">';
  html+='</div>';
  html+='<div class="point-row">';
  html+='<div class="point-dot end"></div>';
  html+='<input class="field-place" type="text" id="ep-'+job.id+'" value="'+endPlace+'" placeholder="到着地点">';
  html+='<input class="field-time" type="time" id="et-'+job.id+'" value="'+(job.end_time||'')+'">';
  html+='<input class="field-meter" type="text" inputmode="text" id="em-'+job.id+'" value="'+(job.end_meter||'')+'" placeholder="km">';
  html+='</div>';
  html+='<input class="field-memo" type="text" id="memo-'+job.id+'" value="'+memoVal+'" placeholder="メモ（任意）" onfocus="this.select()">';
  html+='<div class="job-footer">';
  html+='<label class="nextday-check"><input type="checkbox" id="nd-'+job.id+'" '+ndChecked+'> 翌日着</label>';
  html+='<span class="distance-text" id="dist-'+job.id+'">'+dist+'</span>';
  html+='<button class="save-job-btn" onclick="saveJob(''+job.id+'')">💾 保存</button>';
  html+='</div></div></div>';
  return html;
}

function updateDistance(id){
  var sm=parseInt(document.getElementById('sm-'+id).value)||0;
  var em=parseInt(document.getElementById('em-'+id).value)||0;
  var el=document.getElementById('dist-'+id);
  if(el) el.textContent=sm&&em&&em>sm?(em-sm)+' km':'-- km';
}

async function addJob(){
  var dateStr=getDateStr(currentDate);
  var nextNo=(todayJobs.length>0?Math.max(...todayJobs.map(j=>j.job_no)):0)+1;
  var {data,error}=await sb.from('gyomu_records').insert({
    user_id:userId,date:dateStr,job_no:nextNo
  }).select().single();
  if(error){showMsg('エラー: '+error.message,'err');return;}
  todayJobs.push(data);
  renderJobs();
  showMsg('案件'+nextNo+'を追加しました','ok');
}

async function saveJob(id){
  var job=todayJobs.find(j=>j.id===id);
  if(!job) return;

  var sp=document.getElementById('sp-'+id).value.trim();
  var st=document.getElementById('st-'+id).value.trim();
  var smStr=document.getElementById('sm-'+id).value.trim();
  var ep=document.getElementById('ep-'+id).value.trim();
  var et=document.getElementById('et-'+id).value.trim();
  var emStr=document.getElementById('em-'+id).value.trim();
  var nd=document.getElementById('nd-'+id).checked;
  var jn=document.getElementById('jn-'+id).value.trim();
  var memo=document.getElementById('memo-'+id).value.trim();

  if(smStr&&!/^[0-9]+$/.test(smStr)){showMsg('出発メーターは半角数字で入力してください','err');return;}
  if(emStr&&!/^[0-9]+$/.test(emStr)){showMsg('到着メーターは半角数字で入力してください','err');return;}

  var updates={
    job_name:jn||null,
    memo:memo||null,
    start_place:sp||null,
    start_time:st||null,
    start_meter:smStr?parseInt(smStr):null,
    end_place:ep||null,
    end_time:et||null,
    end_meter:emStr?parseInt(emStr):null,
    next_day:nd,
  };

  var {error}=await sb.from('gyomu_records').update(updates).eq('id',id);
  if(error){showMsg('エラー: '+error.message,'err');return;}

  Object.assign(job,updates);
  renderJobs();
  showMsg('保存しました！','ok');
  loadHistory();
}

async function deleteJob(id){
  if(!confirm('この案件を削除しますか？')) return;
  var {error}=await sb.from('gyomu_records').delete().eq('id',id);
  if(error){showMsg('エラー: '+error.message,'err');return;}
  todayJobs=todayJobs.filter(j=>j.id!==id);
  todayJobs.forEach((j,i)=>{j.job_no=i+1;});
  renderJobs();
  loadHistory();
}

function renderHistory(){
  var el=document.getElementById('history-list');
  if(historyRecords.length===0){el.innerHTML='<div class="empty">記録がありません</div>';return;}
  var grouped={};
  historyRecords.forEach(r=>{
    if(!grouped[r.date]) grouped[r.date]=[];
    grouped[r.date].push(r);
  });
  el.innerHTML=Object.keys(grouped).sort().reverse().slice(0,30).map(date=>{
    var jobs=grouped[date];
    var jobHTML=jobs.map(j=>{
      var dist=j.start_meter&&j.end_meter&&j.end_meter>j.start_meter?'（'+(j.end_meter-j.start_meter)+'km）':'';
      var nd=j.next_day?'翌日':'';
      var name=j.job_name?'【'+j.job_name+'】':'案件'+(j.job_no||'?')+':';
      var incomplete=!j.end_place&&!j.end_time?'<span style="color:#e24b4a"> 到着未入力</span>':'';
      return '<div class="history-job">'+name+' '+(j.start_place||'-')+' '+(j.start_time||'')+'→'+(j.end_place||'未入力')+' '+nd+(j.end_time||'')+dist+(j.memo?' メモ:'+j.memo:'')+incomplete+'</div>';
    }).join('');
    return '<div class="history-day"><div class="history-date">'+date+' — '+jobs.length+'件</div>'+jobHTML+'</div>';
  }).join('');
}

function exportCSV(){
  if(historyRecords.length===0){alert('データがありません');return;}
  var headers=['日付','案件No','案件名','出発地点','出発時刻','出発メーター','到着地点','到着時刻','翌日','到着メーター','走行距離','メモ'];
  var rows=historyRecords.map(r=>{
    var dist=r.start_meter&&r.end_meter?r.end_meter-r.start_meter:'';
    return[r.date,r.job_no,r.job_name||'',r.start_place||'',r.start_time||'',r.start_meter||'',r.end_place||'',r.end_time||'',r.next_day?'翌日':'',r.end_meter||'',dist,r.memo||'']
      .map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  // ファイル名に月を追加
  var now=new Date(new Date().getTime()+9*60*60*1000);
  var ym=now.getUTCFullYear()+'年'+(now.getUTCMonth()+1)+'月';
  var csv='\uFEFF'+headers.join(',')+'\n'+rows.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='業務記録_'+ym+'.csv';a.click();
  URL.revokeObjectURL(url);
}

function showMsg(text,type){
  var el=document.getElementById('msg');
  el.textContent=text;el.className='msg '+type;el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.display='none';},2500);
}

init();
</script>
</body>
</html>
