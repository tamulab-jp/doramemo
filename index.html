<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドラメモ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans',sans-serif;background:#0a1628;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.card{background:#fff;border-radius:16px;padding:2rem 1.5rem;width:100%;max-width:360px}
.logo{text-align:center;margin-bottom:1.75rem}
.logo-icon{font-size:2.5rem;margin-bottom:.5rem}
.logo-title{font-size:1.4rem;font-weight:900;color:#0a1628;letter-spacing:-1px}
.logo-sub{font-size:.78rem;color:#7a8a9e;margin-top:2px}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f4}
.divider span{font-size:.75rem;color:#7a8a9e}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;border:1.5px solid #e2e8f4;border-radius:8px;padding:11px;font-size:.9rem;font-weight:600;color:#0f1c35;cursor:pointer;background:#fff;transition:background .2s}
.google-btn:hover{background:#f7f9fc}
.google-icon{width:20px;height:20px}
label{font-size:.82rem;color:#5a6a82;display:block;margin-bottom:4px;margin-top:.75rem}
input{width:100%;border:1.5px solid #e2e8f4;border-radius:8px;padding:10px 12px;font-size:.9rem;color:#0f1c35;outline:none;transition:border-color .2s}
input:focus{border-color:#f59e0b}
.btn{width:100%;background:#f59e0b;color:#fff;border:none;border-radius:8px;padding:12px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:1.25rem;transition:background .2s}
.btn:hover{background:#d97706}
.btn:disabled{opacity:.6}
.msg{font-size:.82rem;margin-top:.75rem;text-align:center;padding:.5rem;border-radius:6px}
.err{color:#991b1b;background:#fee2e2}
.ok{color:#166534;background:#dcfce7}
.toggle{font-size:.82rem;color:#f59e0b;text-align:center;margin-top:1rem;cursor:pointer;font-weight:600}
.reset{font-size:.78rem;color:#7a8a9e;text-align:center;margin-top:.5rem;cursor:pointer}
.sf-new{display:none}
.tab-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1.25rem}
.tab-btn{padding:8px;border-radius:8px;border:1.5px solid #e2e8f4;background:#f7f9fc;cursor:pointer;text-align:center;font-size:.82rem;font-weight:700;color:#7a8a9e;transition:all .2s}
.tab-btn.active{border-color:#f59e0b;background:#fef3c7;color:#92400e}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🚚</div>
    <div class="logo-title">ドラメモ</div>
    <div class="logo-sub" id="lbl">軽貨物ドライバーの毎日をサポート</div>
  </div>

  <!-- Googleログイン -->
  <button class="google-btn" onclick="loginGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Googleでログイン
  </button>

  <div class="divider"><span>またはメールで</span></div>

  <!-- 新規登録タブ -->
  <div class="sf-new" id="sf-new">
    <label>氏名</label>
    <input type="text" id="name" placeholder="例：田村 守">
  </div>

  <label>メールアドレス</label>
  <input type="email" id="em" placeholder="example@email.com">
  <label>パスワード</label>
  <input type="password" id="pw" placeholder="8文字以上">

  <button class="btn" id="btn" onclick="handleAuth()">ログイン</button>
  <div class="msg" id="msg" style="display:none"></div>
  <div class="toggle" id="tgl" onclick="toggleMode()">アカウントを新規作成</div>
  <div class="reset" onclick="window.location.href='reset.html'">パスワードをお忘れの方</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL='https://atezlxzzsfmabmkigqpg.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0ZXpseHp6c2ZtYWJta2lncXBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTgzMTgsImV4cCI6MjA5NTY3NDMxOH0.uN-517Q9wXyu7_MPzcOn6TfLBsEwnMThy65BUlfBEr4';
var sb=window.supabase.createClient(SURL,SKEY);
var isUp=false;

async function init(){
  var {data:{session}}=await sb.auth.getSession();
  if(session) window.location.href='home.html';
}

function toggleMode(){
  isUp=!isUp;
  document.getElementById('lbl').textContent=isUp?'新規アカウント作成':'軽貨物ドライバーの毎日をサポート';
  document.getElementById('btn').textContent=isUp?'登録する':'ログイン';
  document.getElementById('tgl').textContent=isUp?'ログインに戻る':'アカウントを新規作成';
  document.getElementById('sf-new').style.display=isUp?'block':'none';
  document.getElementById('msg').style.display='none';
}

async function loginGoogle(){
  var {error}=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:window.location.origin+'/home.html'}
  });
  if(error) showMsg(error.message,'err');
}

async function handleAuth(){
  var em=document.getElementById('em').value.trim();
  var pw=document.getElementById('pw').value;
  var btn=document.getElementById('btn');
  if(!em||!pw){showMsg('入力してください','err');return;}
  btn.disabled=true;

  if(isUp){
    var name=document.getElementById('name').value.trim();
    if(!name){showMsg('氏名を入力してください','err');btn.disabled=false;return;}
    var {data,error}=await sb.auth.signUp({email:em,password:pw});
    if(error){showMsg(error.message,'err');btn.disabled=false;return;}
    await sb.from('user_profiles').insert({id:data.user.id,name:name});
    await sb.from('user_settings').insert({user_id:data.user.id,feature_tenko:true});
    showMsg('登録完了！確認メールを送信しました。','ok');
  } else {
    var {error:e2}=await sb.auth.signInWithPassword({email:em,password:pw});
    if(e2){showMsg('メールまたはパスワードが違います','err');btn.disabled=false;return;}
    window.location.href='home.html';
  }
  btn.disabled=false;
}

function showMsg(text,type){
  var el=document.getElementById('msg');
  el.textContent=text;
  el.className='msg '+type;
  el.style.display='block';
}

init();
</script>
</body>
</html>
