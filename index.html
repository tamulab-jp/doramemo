<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ドラメモ">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドラメモ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans',sans-serif;background:#0a1628;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.card{background:#fff;border-radius:16px;padding:2rem 1.5rem;width:100%;max-width:360px}
.logo{text-align:center;margin-bottom:1.75rem}
.logo-icon{font-size:2.5rem;margin-bottom:.5rem}
.logo-title{font-size:1.4rem;font-weight:900;color:#0a1628;letter-spacing:-1px}
.logo-sub{font-size:.78rem;color:#7a8a9e;margin-top:2px}
label{font-size:.82rem;color:#5a6a82;display:block;margin-bottom:4px;margin-top:.75rem}
input{width:100%;border:1.5px solid #e2e8f4;border-radius:8px;padding:10px 12px;font-size:.9rem;color:#0f1c35;outline:none;transition:border-color .2s}
input:focus{border-color:#f59e0b}
.btn{width:100%;background:#f59e0b;color:#fff;border:none;border-radius:8px;padding:12px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:1.25rem;transition:background .2s}
.btn:hover{background:#d97706}
.btn:disabled{opacity:.6}
.msg{font-size:.82rem;margin-top:.75rem;text-align:center;padding:.5rem;border-radius:6px}
.err{color:#991b1b;background:#fee2e2}
.ok{color:#166534;background:#dcfce7}
.warn{color:#92400e;background:#fef3c7}
.toggle{font-size:.82rem;color:#f59e0b;text-align:center;margin-top:1rem;cursor:pointer;font-weight:600}
.reset{font-size:.78rem;color:#7a8a9e;text-align:center;margin-top:.5rem;cursor:pointer}
.sf-new{display:none}
</style>
</head>
<body>
<div class="card">
<div class="logo">
<div class="logo-icon">🚚</div>
<div class="logo-title">ドラメモ</div>
<div class="logo-sub" id="lbl">軽貨物ドライバーの毎日をサポート</div>
</div>
<div class="sf-new" id="sf-new">
<label>氏名</label>
<input type="text" id="name" placeholder="例：田村 守">
</div>
<label>メールアドレス</label>
<input type="email" id="em" placeholder="example@email.com">
<label>パスワード</label>
<input type="password" id="pw" placeholder="8文字以上">
<button class="btn" id="btn" onclick="handleAuth()">ログイン</button>
<div class="msg" id="msg" style="display:none"></div>
<div class="toggle" id="tgl" onclick="toggleMode()">アカウントを新規作成</div>
<div class="reset" onclick="window.location.href='reset.html'">パスワードをお忘れの方</div>
<div style="text-align:center;margin-top:1.25rem;font-size:.7rem;color:#b0bac8;">ドラメモ v1.2.1</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL='https://hyvjvcdahahrznhujtaz.supabase.co';
var SKEY='SUPABASE_KEY';
var sb=window.supabase.createClient(SURL,SKEY);
var isUp=false;

// === 停止中チェック ===
// dm_subscriptions の is_active を見て、停止中なら true を返す
async function isServiceStopped(){
  try{
    var {data,error}=await sb.from('dm_subscriptions').select('is_active').limit(1).single();
    if(error){
      // 読み取りに失敗した場合は、止めずに通す（締め出し事故を防ぐ）
      console.log('subscription check skipped:', error.message);
      return false;
    }
    return data && data.is_active===false;
  }catch(e){
    console.log('subscription check error:', e);
    return false;
  }
}

// === ユーザー個人の課金状態チェック ===
// dm_user_profiles.status / trial_ends_at を見て、ブロックすべきか判定する。
// 戻り値: null（ブロックしない・通す） または {message:'案内文'}（ブロックする）
async function checkUserStatus(userId){
  try{
    var {data,error}=await sb.from('dm_user_profiles').select('status,trial_ends_at').eq('id',userId).single();
    if(error||!data){
      // 読み取り失敗時は締め出し事故を防ぐため通す
      console.log('user status check skipped:', error&&error.message);
      return null;
    }
    if(data.status==='expired'){
      return {message:'ご利用期間が終了しました'};
    }
    if(data.status==='trial'){
      if(data.trial_ends_at && new Date(data.trial_ends_at).getTime() < Date.now()){
        return {message:'お試し期間が終了しました。継続には契約が必要です'};
      }
      return null; // trial中かつ期限内
    }
    // active、または未知の値は通す
    return null;
  }catch(e){
    console.log('user status check error:', e);
    return null;
  }
}

// === 二段構えのアクセス判定 ===
// ①アプリ全体の停止チェック → ②個人の課金状態チェック の順で行う。
// ブロックする場合は signOut させ、案内メッセージを返す。ブロックしない場合は null を返す。
async function checkAccess(userId){
  if(await isServiceStopped()){
    return 'ただいまサービスを一時停止しています。再開までしばらくお待ちください。';
  }
  var userBlock=await checkUserStatus(userId);
  if(userBlock){
    return userBlock.message;
  }
  return null;
}

async function init(){
// URLのハッシュにaccess_tokenがある場合（メール確認後のリダイレクト）
var hash=window.location.hash;
if(hash&&hash.includes('access_token')){
var {data:{session},error}=await sb.auth.getSession();
if(session){
var blockMsg=await checkAccess(session.user.id);
if(blockMsg){await sb.auth.signOut();showMsg(blockMsg,'warn');return;}
window.location.href='home.html';
return;
}
// セッションが取れない場合は少し待ってから再試行
setTimeout(async function(){
var {data:{session:s2}}=await sb.auth.getSession();
if(s2){
var blockMsg2=await checkAccess(s2.user.id);
if(blockMsg2){await sb.auth.signOut();showMsg(blockMsg2,'warn');return;}
window.location.href='home.html';
}
else showMsg('メール確認が完了しました。ログインしてください。','ok');
},1000);
return;
}
var {data:{session}}=await sb.auth.getSession();
if(session){
var blockMsg3=await checkAccess(session.user.id);
if(blockMsg3){await sb.auth.signOut();showMsg(blockMsg3,'warn');return;}
window.location.href='home.html';
}
}

function toggleMode(){
isUp=!isUp;
document.getElementById('lbl').textContent=isUp?'新規アカウント作成':'軽貨物ドライバーの毎日をサポート';
document.getElementById('btn').textContent=isUp?'登録する':'ログイン';
document.getElementById('tgl').textContent=isUp?'ログインに戻る':'アカウントを新規作成';
document.getElementById('sf-new').style.display=isUp?'block':'none';
document.getElementById('msg').style.display='none';
}

async function handleAuth(){
var em=document.getElementById('em').value.trim();
var pw=document.getElementById('pw').value;
var btn=document.getElementById('btn');
if(!em||!pw){showMsg('入力してください','err');return;}
btn.disabled=true;
if(isUp){
var name=document.getElementById('name').value.trim();
if(!name){showMsg('氏名を入力してください','err');btn.disabled=false;return;}
// 氏名は登録メタデータで渡す → Supabaseのトリガーが dm_user_profiles を自動作成
var {data,error}=await sb.auth.signUp({
email:em,
password:pw,
options:{data:{name:name}}
});
if(error){showMsg(error.message,'err');btn.disabled=false;return;}
showMsg('登録完了！ログインしてください。','ok');
} else {
var {data:signInData,error:e2}=await sb.auth.signInWithPassword({email:em,password:pw});
if(e2){showMsg('メールまたはパスワードが違います','err');btn.disabled=false;return;}
// ログイン成功後、①アプリ全体の停止 → ②個人の課金状態 を順に確認
var blockMsg4=await checkAccess(signInData.user.id);
if(blockMsg4){
await sb.auth.signOut();
showMsg(blockMsg4,'warn');
btn.disabled=false;
return;
}
window.location.href='home.html';
}
btn.disabled=false;
}

function showMsg(text,type){
var el=document.getElementById('msg');
el.textContent=text;
el.className='msg '+type;
el.style.display='block';
}

init();
</script>
<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('/doramemo/sw.js').then(reg=>{
console.log('SW registered');
}).catch(err=>{
console.log('SW error:', err);
});
}
</script>
</body>
</html>
